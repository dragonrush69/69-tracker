const StackCalcScreen = () => {
  const [lad,     setLad]     = useState({ leadership:"", authority:"", dominance:"" });
  const [tiers,   setTiers]   = useState({ ...DEFAULT_TIERS });
  const [loading, setLoading] = useState(false);
  const [result,  setResult]  = useState(null);   // { mercs, monsters, guards }
  const [error,   setError]   = useState(null);
  const [copied,  setCopied]  = useState(false);
  const [email,   setEmail]   = useState(() => { try { return localStorage.getItem("69ct_stack_email") || ""; } catch { return ""; } });

  const toggleTier = (key) => setTiers(t => ({ ...t, [key]: !t[key] }));

  const calculate = async () => {
    if (!stackEnabled()) return;
    setLoading(true);
    setError(null);
    setResult(null);
    try {
      const res  = await fetch(STACK_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({
          leadership: Number(lad.leadership) || 0,
          authority:  Number(lad.authority)  || 0,
          dominance:  Number(lad.dominance)  || 0,
          tiers,
        }),
        redirect: "follow",
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setResult(data.stack);
    } catch (err) {
      setError(err.message || "Could not reach the calculator. Check the URL and try again.");
    } finally {
      setLoading(false);
      scrollToTop();
    }
  };

  const copyToClipboard = () => {
    if (!result) return;
    const lines = [];
    if (result.mercs?.length)    { lines.push("MERCS"); result.mercs.forEach(t => lines.push(`  ${t.name}: ${t.qty.toLocaleString()}`)); }
    if (result.monsters?.length) { lines.push("MONSTERS"); result.monsters.forEach(t => lines.push(`  ${t.name}: ${t.qty.toLocaleString()}`)); }
    if (result.guards?.length)   { lines.push("GUARDS"); result.guards.forEach(t => lines.push(`  ${t.name}: ${t.qty.toLocaleString()}`)); }
    const text = lines.join("\n");
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); });
    } else {
      // Fallback for older mobile browsers
      const el = document.createElement("textarea");
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand("copy");
      document.body.removeChild(el);
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    }
  };

  const saveEmail = (val) => {
    setEmail(val);
    try { localStorage.setItem("69ct_stack_email", val); } catch {}
  };

  const buildTextLines = () => {
    if (!result) return [];
    const lines = [];
    if (result.mercs?.length)    { lines.push("MERCS");    result.mercs.forEach(t => lines.push(`  ${t.name}: ${t.qty.toLocaleString()}`)); lines.push(""); }
    if (result.monsters?.length) { lines.push("MONSTERS"); result.monsters.forEach(t => lines.push(`  ${t.name}: ${t.qty.toLocaleString()}`)); lines.push(""); }
    if (result.guards?.length)   { lines.push("GUARDS");   result.guards.forEach(t => lines.push(`  ${t.name}: ${t.qty.toLocaleString()}`)); }
    return lines;
  };

  const downloadCSV = () => {
    if (!result) return;
    const rows = [["Group","Name","Quantity"]];
    (result.mercs    || []).forEach(t => rows.push(["Mercs",    t.name, t.qty]));
    (result.monsters || []).forEach(t => rows.push(["Monsters", t.name, t.qty]));
    (result.guards   || []).forEach(t => rows.push(["Guards",   t.name, t.qty]));
    const csv  = rows.map(r => r.join(",")).join("\n");
    const blob = new Blob([csv], { type:"text/csv" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `stack_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const openEmail = () => {
    if (!result) return;
    const subject = encodeURIComponent(`Stack Calculator Results — ${new Date().toLocaleDateString()}`);
    const body    = encodeURIComponent(buildTextLines().join("\n"));
    const to      = encodeURIComponent(email.trim());
    window.location.href = `mailto:${to}?subject=${subject}&body=${body}`;
  };

  const ladField = (key, label) => (
    <div key={key} style={{ flex:1 }}>
      <div style={{ fontSize:11, fontWeight:700, color:"#64748b", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:4 }}>{label}</div>
      <input
        type="number"
        inputMode="numeric"
        placeholder="0"
        value={lad[key]}
        onChange={e => setLad(l => ({ ...l, [key]: e.target.value }))}
        style={{ width:"100%", padding:"10px 12px", border:"1.5px solid #e2e8f0", borderRadius:10, fontSize:15, fontWeight:600, fontFamily:"'DM Mono',monospace", color:"#1e293b", backgroundColor:"#fff", textAlign:"right" }}
      />
    </div>
  );

  const totalTroops = result
    ? (result.mercs?.length || 0) + (result.monsters?.length || 0) + (result.guards?.length || 0)
    : 0;

  const resultSection = (label, color, troops) => {
    if (!troops?.length) return null;
    return (
      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:11, fontWeight:700, color, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:6 }}>{label}</div>
        <div style={{ backgroundColor:"#fff", borderRadius:12, border:"1.5px solid #e2e8f0", overflow:"hidden" }}>
          {troops.map((t, i) => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 14px", borderBottom: i < troops.length-1 ? "1px solid #f1f5f9" : "none" }}>
              <span style={{ fontSize:13, fontWeight:600, color:"#1e293b" }}>{t.name}</span>
              <span style={{ fontSize:14, fontWeight:700, color:"#1e293b", fontFamily:"'DM Mono',monospace" }}>{t.qty.toLocaleString()}</span>
            </div>
          ))}
        </div>
      </div>
    );
  };

  return (
    <div style={{ padding:"16px 16px 24px" }}>

      {/* URL not configured warning */}
      {!stackEnabled() && (
        <div style={{ backgroundColor:"#fef3c7", border:"1.5px solid #fbbf24", borderRadius:12, padding:"14px 16px", marginBottom:18 }}>
          <div style={{ fontSize:13, fontWeight:700, color:"#92400e", marginBottom:4 }}>Stack Calculator not configured</div>
          <div style={{ fontSize:12, color:"#92400e", lineHeight:1.5 }}>
            Deploy <strong>AppScript_StackCalc.js</strong> as a Web App on your stacking spreadsheet, then paste the URL into the <code style={{ backgroundColor:"#fde68a", borderRadius:4, padding:"1px 4px" }}>STACK_URL</code> constant in index.html and redeploy.
          </div>
        </div>
      )}

      {/* LAD inputs */}
      <div style={{ marginBottom:18 }}>
        <SecHeader title="Leadership / Authority / Dominance"/>
        <div style={{ display:"flex", gap:10 }}>
          {ladField("leadership", "Leadership")}
          {ladField("authority",  "Authority")}
          {ladField("dominance",  "Dominance")}
        </div>
      </div>

      {/* Tier checkboxes */}
      <div style={{ marginBottom:20 }}>
        <SecHeader title="Troop Tiers"/>
        <div style={{ backgroundColor:"#fff", borderRadius:12, border:"1.5px solid #e2e8f0", overflow:"hidden", padding:"12px 12px 8px" }}>
          {/* Column headers */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6, marginBottom:8 }}>
            {TIER_COLS.map(col => (
              <div key={col.type} style={{ textAlign:"center", fontSize:11, fontWeight:700, color:"#64748b", textTransform:"uppercase", letterSpacing:"0.07em" }}>{col.label}</div>
            ))}
          </div>
          {/* Checkbox grid: 4 rows × 4 cols */}
          {TIER_LEVELS.map(lvl => (
            <div key={lvl} style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6, marginBottom:6 }}>
              {TIER_COLS.map(col => {
                const key     = `${col.type}${lvl}`;
                const checked = tiers[key] || false;
                const bgMap   = { G:"#f0fdf4", S:"#eff6ff", E:"#fdf4ff", M:"#fef3c7" };
                const txMap   = { G:"#15803d", S:"#1d4ed8", E:"#7e22ce", M:"#b45309" };
                return (
                  <button
                    key={key}
                    onClick={() => toggleTier(key)}
                    style={{
                      padding:"8px 0",
                      borderRadius:8,
                      border: checked ? `2px solid ${txMap[col.type]}` : "2px solid #e2e8f0",
                      backgroundColor: checked ? bgMap[col.type] : "#f8fafc",
                      color: checked ? txMap[col.type] : "#94a3b8",
                      fontSize:13,
                      fontWeight:700,
                      fontFamily:"'DM Mono',monospace",
                      cursor:"pointer",
                      transition:"all 0.12s",
                      lineHeight:1,
                      minHeight:36,
                    }}
                  >{key}</button>
                );
              })}
            </div>
          ))}
          {/* Select all / Clear all */}
          <div style={{ display:"flex", gap:8, marginTop:10 }}>
            <button onClick={() => setTiers(Object.fromEntries(Object.keys(DEFAULT_TIERS).map(k => [k, true])))}
              style={{ flex:1, padding:"8px 0", borderRadius:8, border:"1.5px solid #e2e8f0", backgroundColor:"#f8fafc", fontSize:12, fontWeight:600, color:"#64748b", cursor:"pointer" }}>
              Select all
            </button>
            <button onClick={() => setTiers({ ...DEFAULT_TIERS })}
              style={{ flex:1, padding:"8px 0", borderRadius:8, border:"1.5px solid #e2e8f0", backgroundColor:"#f8fafc", fontSize:12, fontWeight:600, color:"#64748b", cursor:"pointer" }}>
              Clear all
            </button>
          </div>
        </div>
      </div>

      {/* Calculate button */}
      <button
        onClick={calculate}
        disabled={loading || !stackEnabled()}
        style={{
          width:"100%", padding:"14px 0", borderRadius:12, border:"none",
          backgroundColor: loading || !stackEnabled() ? "#94a3b8" : "#1e293b",
          color:"#fff", fontSize:15, fontWeight:700, cursor: loading || !stackEnabled() ? "default" : "pointer",
          marginBottom:20, display:"flex", alignItems:"center", justifyContent:"center", gap:8,
        }}
      >
        {loading
          ? <><div style={{ width:16, height:16, border:"2.5px solid #ffffff66", borderTopColor:"#fff", borderRadius:8, animation:"spin 0.7s linear infinite" }}/> Calculating…</>
          : <><Icon name="calc" size={18} color="#fff"/> Calculate Stack</>
        }
      </button>

      {/* Error */}
      {error && (
        <div style={{ backgroundColor:"#fef2f2", border:"1.5px solid #fca5a5", borderRadius:12, padding:"12px 16px", marginBottom:16, fontSize:13, color:"#dc2626", fontWeight:600 }}>
          {error}
        </div>
      )}

      {/* Results */}
      {result && (
        <div>
          {/* Results count + copy */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
            <span style={{ fontSize:12, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.08em" }}>{totalTroops} troop type{totalTroops!==1?"s":""}</span>
            <button
              onClick={copyToClipboard}
              style={{ display:"flex", alignItems:"center", gap:6, padding:"8px 14px", borderRadius:8, border:"1.5px solid #e2e8f0", backgroundColor: copied ? "#f0fdf4" : "#fff", fontSize:12, fontWeight:700, color: copied ? "#16a34a" : "#1e293b", cursor:"pointer" }}
            >
              <Icon name="copy" size={14} color={copied ? "#16a34a" : "#1e293b"}/>
              {copied ? "Copied!" : "Copy"}
            </button>
          </div>

          {/* Export actions */}
          <div style={{ backgroundColor:"#fff", borderRadius:12, border:"1.5px solid #e2e8f0", padding:"14px", marginBottom:16 }}>
            <div style={{ fontSize:11, fontWeight:700, color:"#64748b", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:10 }}>Export results</div>

            {/* Email input */}
            <div style={{ marginBottom:10 }}>
              <input
                type="email"
                inputMode="email"
                placeholder="your@email.com"
                value={email}
                onChange={e => saveEmail(e.target.value)}
                style={{ width:"100%", padding:"10px 12px", border:"1.5px solid #e2e8f0", borderRadius:10, fontSize:14, color:"#1e293b", backgroundColor:"#f8fafc" }}
              />
            </div>

            {/* Buttons row */}
            <div style={{ display:"flex", gap:8 }}>
              <button
                onClick={downloadCSV}
                style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"11px 0", borderRadius:10, border:"1.5px solid #e2e8f0", backgroundColor:"#f8fafc", fontSize:13, fontWeight:700, color:"#1e293b", cursor:"pointer" }}
              >
                <Icon name="download" size={16} color="#1e293b"/>
                Download CSV
              </button>
              <button
                onClick={openEmail}
                disabled={!email.trim()}
                style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"11px 0", borderRadius:10, border:"none", backgroundColor: email.trim() ? "#1e293b" : "#94a3b8", fontSize:13, fontWeight:700, color:"#fff", cursor: email.trim() ? "pointer" : "default" }}
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                Email results
              </button>
            </div>
            {!email.trim() && (
              <div style={{ fontSize:11, color:"#94a3b8", marginTop:6, textAlign:"center" }}>Enter an email address to enable the email button</div>
            )}
          </div>

          {resultSection("Mercs",    "#7c3aed", result.mercs)}
          {resultSection("Monsters", "#b45309", result.monsters)}
          {resultSection("Guards",   "#0369a1", result.guards)}
        </div>
      )}

      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
};

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
const ALL_NAV = [
  { id:"players",     label:"Players",      icon:"players", roles:["super","clan","user"] },
  { id:"scores",      label:"Score Entry",  icon:"score",   roles:["super","clan"]        },
  { id:"trends",      label:"Summary",      icon:"trends",  roles:["super","clan"]        },
  { id:"updateLevel", label:"Update Level", icon:"levelUp", roles:["super","clan","user"] },
  { id:"stack",       label:"Stack Calc",   icon:"calc",    roles:["super","clan","user"] },
  { id:"admin",       label:"Admin",        icon:"admin",   roles:["super","clan"]        },
];

const BottomNav = ({ active, onChange, badge }) => {
  const { role } = useSession();
  const visible = ALL_NAV.filter(item => item.roles.includes(role));
  return (
    <div style={{ position:"fixed", bottom:0, left:0, right:0, backgroundColor:"#fff", borderTop:"1px solid #e2e8f0", display:"flex", paddingBottom:"env(safe-area-inset-bottom,0px)", zIndex:100 }}>
      {visible.map(item=>(
        <button key={item.id} onClick={()=>onChange(item.id)} style={{ flex:1, padding:"10px 2px 12px", display:"flex", flexDirection:"column", alignItems:"center", gap:3, border:"none", backgroundColor:"transparent", cursor:"pointer", position:"relative" }}>
          <div style={{ transform:active===item.id?"scale(1.1)":"scale(1)", transition:"transform 0.15s", position:"relative" }}>
            <Icon name={item.icon} size={21} color={active===item.id?"#1e293b":"#94a3b8"}/>
            {item.id==="admin"&&badge>0 && <span style={{ position:"absolute", top:-4, right:-6, backgroundColor:"#dc2626", color:"#fff", borderRadius:8, fontSize:9, fontWeight:800, padding:"1px 4px", lineHeight:"14px", minWidth:14, textAlign:"center" }}>{badge}</span>}
          </div>
          <span style={{ fontSize:9, fontWeight:active===item.id?700:500, color:active===item.id?"#1e293b":"#94a3b8", whiteSpace:"nowrap" }}>{item.label}</span>
          {active===item.id && <div style={{ position:"absolute", bottom:0, width:28, height:2.5, backgroundColor:"#1e293b", borderRadius:"2px 2px 0 0" }}/>}
        </button>
      ))}
    </div>
  );
};

// ─── PAGE HEADER ──────────────────────────────────────────────────────────────
const PageHeader = ({ screen, onLogout }) => {
  const { role, clan } = useSession();
  const titles = {
    players:     { title:"Players",          sub:"Clan rosters & levels"       },
    scores:      { title:"Score Entry",      sub:"Record event scores"         },
    trends:      { title:"Summary",          sub:"Trends & performance"        },
    updateLevel: { title:"Update Level",     sub:"Submit a level request"      },
    stack:       { title:"Stack Calculator", sub:"Recommended troop stack"     },
    admin:       { title:"Admin",            sub:"Settings & tools"            },
  };
  const { title, sub } = titles[screen]||titles.admin;
  const roleLabel = role==="super" ? "Admin" : role==="clan" ? clan : "Player";
  const roleBg    = role==="super" ? "#1e293b" : role==="clan" ? { "69R":"#dc2626","69S":"#2563eb","69D":"#16a34a" }[clan] : "#64748b";
  return (
    <div style={{ padding:"16px 16px 12px", backgroundColor:"#fff", borderBottom:"1px solid #f1f5f9", position:"sticky", top:0, zIndex:50 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ width:30, height:30, borderRadius:8, backgroundColor:"#1e293b", display:"flex", alignItems:"center", justifyContent:"center" }}>
            <Icon name="trophy" size={15} color="#f59e0b"/>
          </div>
          <div style={{ fontSize:10, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.1em", fontFamily:"'DM Mono',monospace" }}>69 Tracker</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ backgroundColor:roleBg+"22", color:roleBg, border:`1px solid ${roleBg}44`, borderRadius:6, padding:"2px 8px", fontSize:11, fontWeight:700, fontFamily:"'DM Mono',monospace" }}>{roleLabel}</span>
          <button onClick={onLogout} style={{ background:"none", border:"1px solid #e2e8f0", borderRadius:8, padding:"4px 10px", fontSize:11, fontWeight:600, color:"#94a3b8", cursor:"pointer" }}>Lock</button>
        </div>
      </div>
      <h1 style={{ fontSize:22, fontWeight:800, color:"#1e293b", margin:0, letterSpacing:"-0.02em" }}>{title}</h1>
      <p style={{ fontSize:12, color:"#94a3b8", margin:"2px 0 0", fontWeight:500 }}>{sub}</p>
    </div>
  );
};

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [session,   setSession]   = useState(() => loadSession());
  const [screen,    setScreen]    = useState("players");
  const [appReady,  setAppReady]  = useState(false);
  const [loadError, setLoadError] = useState(false);
  const forceUpdate = useForceUpdate();

  // Load data from Sheets once logged in
  useEffect(() => {
    if (!session) return;
    async function init() {
      if (sheetsEnabled()) {
        const data = await loadFromSheets();
        if (data && !data.error) {
          window._appData = data;
        } else {
          _ensure();
          setLoadError(true);
        }
      } else {
        _ensure();
      }
      // For user role, always land on Update Level
      if (session.role === "user") setScreen("updateLevel");
      setAppReady(true);
    }
    init();
  }, [session]);

  const handleLogin = (s) => {
    setSession(s);
    setAppReady(false);
  };

  const handleLogout = () => {
    saveSession(null);
    setSession(null);
    setAppReady(false);
    setScreen("players");
  };

  const globalStyles = `
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap');
    *{box-sizing:border-box;}
    input:focus,textarea:focus,select:focus{border-color:#1e293b!important;box-shadow:0 0 0 3px rgba(30,41,59,0.08);}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
    ::-webkit-scrollbar{display:none;}
    button{min-height:44px;}
    button:active{opacity:0.82;}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
    a,button{-webkit-tap-highlight-color:transparent;}
  `;

  const shell = children => (
    <div style={{ maxWidth:430, margin:"0 auto", minHeight:"100vh", backgroundColor:"#f8fafc", fontFamily:"'Outfit','DM Sans',system-ui,sans-serif" }}>
      <style>{globalStyles}</style>
      {children}
    </div>
  );

  // Not logged in — show PIN screen (no session context needed here)
  if (!session) return shell(<SessionCtx.Provider value={{ role:"none", clan:null }}><LoginScreen onLogin={handleLogin}/></SessionCtx.Provider>);

  // Loading data after login
  if (!appReady) return shell(
    <SessionCtx.Provider value={session}>
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", gap:16 }}>
        <div style={{ width:52, height:52, borderRadius:14, backgroundColor:"#1e293b", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <Icon name="trophy" size={24} color="#f59e0b"/>
        </div>
        <div style={{ fontSize:13, fontWeight:600, color:"#94a3b8", letterSpacing:"0.05em" }}>Loading clan data…</div>
        <div style={{ width:36, height:4, borderRadius:4, backgroundColor:"#e2e8f0", overflow:"hidden" }}>
          <div style={{ height:"100%", width:"60%", backgroundColor:"#1e293b", borderRadius:4 }}/>
        </div>
      </div>
    </SessionCtx.Provider>
  );

  const { total } = getActionItems();
  const screens = {
    players:     <PlayersScreen/>,
    scores:      <ScoreEntryScreen/>,
    trends:      <TrendsScreen/>,
    updateLevel: <UpdateLevelScreen/>,
    stack:       <StackCalcScreen/>,
    admin:       <AdminScreen/>,
  };

  // Ensure screen is valid for current role
  const validScreens = ALL_NAV.filter(n => n.roles.includes(session.role)).map(n => n.id);
  const activeScreen = validScreens.includes(screen) ? screen : validScreens[0];

  return shell(
    <SessionCtx.Provider value={session}>
      {loadError && (
        <div style={{ backgroundColor:"#fef3c7", padding:"8px 16px", fontSize:12, color:"#92400e", fontWeight:600, textAlign:"center" }}>
          ⚠️ Could not reach Google Sheets — working offline. Data will not be saved.
        </div>
      )}
      <PageHeader screen={activeScreen} onLogout={handleLogout}/>
      <div style={{ paddingBottom:80 }}>{screens[activeScreen]}</div>
      <BottomNav active={activeScreen} onChange={s=>{ setScreen(s); scrollToTop(); }} badge={total}/>
    </SessionCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>

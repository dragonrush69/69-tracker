// ─── IMPORT VIEW ──────────────────────────────────────────────────────────────
const ImportView = ({ onBack, onImported }) => {
  const fileRef = useRef(null);
  const [stage,   setStage]   = useState("pick");
  const [preview, setPreview] = useState(null);
  const [errMsg,  setErrMsg]  = useState("");

  const readFile = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data.players))       throw new Error("Missing or invalid 'players' array.");
        if (typeof data.scores !== "object")    throw new Error("Missing or invalid 'scores' object.");
        setPreview(data);
        setStage("preview");
      } catch(err) {
        setErrMsg(err.message || "Could not parse file.");
        setStage("error");
      }
    };
    reader.readAsText(file);
  };

  const confirmImport = () => {
    window._appData = {
      players:       preview.players       || [],
      scores:        preview.scores        || {},
      levelRequests: preview.levelRequests || [],
      rotationLog:   preview.rotationLog   || [],
      lastBackup:    storage.getLastBackup(),
    };
    setStage("done");
    setTimeout(() => onImported(), 1200);
  };

  const scoreEntryCount = preview ? Object.values(preview.scores || {}).reduce((a,v) => a + (v?.length||0), 0) : 0;
  const exportDate      = preview?.exportedAt ? new Date(preview.exportedAt).toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" }) : "Unknown";

  return (
    <div style={{ padding:"0 16px 16px" }}>
      <BackBtn onBack={onBack}/>
      <h2 style={{ fontSize:20, fontWeight:800, color:"#1e293b", margin:"0 0 6px" }}>Import Backup</h2>
      <p style={{ fontSize:13, color:"#64748b", margin:"0 0 20px", lineHeight:1.5 }}>
        Select a JSON backup file. Your current data will be replaced after you confirm.
      </p>

      <input ref={fileRef} type="file" accept=".json,application/json" onChange={readFile} style={{ display:"none" }}/>

      {stage === "pick" && (
        <Btn onClick={()=>fileRef.current?.click()} variant="primary" size="lg" fullWidth>
          <Icon name="upload" size={17} color="#fff"/> Choose File
        </Btn>
      )}

      {stage === "error" && (
        <>
          <div style={{ backgroundColor:"#fef2f2", borderRadius:12, padding:"14px 16px", marginBottom:16 }}>
            <div style={{ fontSize:14, fontWeight:700, color:"#dc2626", marginBottom:4 }}>Invalid file</div>
            <div style={{ fontSize:13, color:"#dc2626" }}>{errMsg}</div>
          </div>
          <Btn onClick={()=>{ setStage("pick"); if(fileRef.current) fileRef.current.value=""; }} variant="ghost" size="lg" fullWidth>Try Again</Btn>
        </>
      )}

      {stage === "preview" && preview && (
        <>
          <div style={{ backgroundColor:"#f8fafc", borderRadius:12, padding:"16px", marginBottom:20 }}>
            <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:12 }}>Backup Preview</div>
            {[
              { label:"Players",        value: preview.players.length },
              { label:"Score entries",  value: scoreEntryCount },
              { label:"Level requests", value: (preview.levelRequests || []).length },
              { label:"Rotations",      value: (preview.rotationLog   || []).length },
              { label:"Exported",       value: exportDate },
            ].map(row => (
              <div key={row.label} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom:"1px solid #f1f5f9" }}>
                <span style={{ fontSize:13, color:"#64748b" }}>{row.label}</span>
                <span style={{ fontSize:13, fontWeight:700, color:"#1e293b", fontFamily:"'DM Mono',monospace" }}>{row.value}</span>
              </div>
            ))}
          </div>
          <div style={{ backgroundColor:"#fef3c7", borderRadius:10, padding:"10px 14px", marginBottom:16, fontSize:13, color:"#92400e" }}>
            ⚠️ This will overwrite all current data. This cannot be undone.
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <Btn onClick={()=>{ setStage("pick"); if(fileRef.current) fileRef.current.value=""; }} variant="ghost" size="lg" fullWidth>Cancel</Btn>
            <Btn onClick={confirmImport} variant="primary" size="lg" fullWidth>Confirm Import</Btn>
          </div>
        </>
      )}

      {stage === "done" && (
        <div style={{ textAlign:"center", padding:"32px 0" }}>
          <div style={{ width:60, height:60, borderRadius:18, backgroundColor:"#f0fdf4", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 12px" }}>
            <Icon name="check" size={28} color="#16a34a"/>
          </div>
          <div style={{ fontSize:18, fontWeight:800, color:"#1e293b" }}>Import complete!</div>
        </div>
      )}
    </div>
  );
};

// ─── BULK PLAYER UPDATE ───────────────────────────────────────────────────────
const BulkPlayerUpdate = ({ onBack }) => {
  const [text,       setText]       = useState("");
  const [results,    setResults]    = useState(null);
  const [decisions,  setDecisions]  = useState({});
  const [newClan,    setNewClan]    = useState("69R");
  const [saved,      setSaved]      = useState(false);

  const allPlayers = storage.getPlayers();

  const parse = () => {
    const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
    const parsed = lines.map(line => {
      const parts = line.split(/\s+/);
      if (parts.length < 8) return { raw:line, type:"error", reason:"Need 8+ fields: Name Hero Level Might G-level M-level S-level E-level" };
      const [eRaw, sRaw, mRaw, gRaw, mightRaw, levelRaw, heroRaw] = parts.slice(-7).reverse();
      const nameParts = parts.slice(0, parts.length - 7);
      const name = nameParts.join(" ");
      if (!name.trim()) return { raw:line, type:"error", reason:"Player name is required" };
      const heroN  = Number(heroRaw);
      const levelN = Number(levelRaw);
      const mightN = Number(mightRaw);
      if (isNaN(heroN)  || heroN  < 0) return { raw:line, type:"error", reason:`Hero must be a number (got: ${heroRaw})` };
      if (isNaN(levelN) || levelN < 0) return { raw:line, type:"error", reason:`Level must be a number (got: ${levelRaw})` };
      if (isNaN(mightN) || mightN < 0) return { raw:line, type:"error", reason:`Might must be a number (got: ${mightRaw})` };
      const toLevel = (key, val) => {
        if (!val || val === "-" || val === "—") return null;
        const v = String(val).trim().toUpperCase();
        const n = parseInt(v.slice(key.length));
        if (new RegExp(`^${key}\\d+$`).test(v) && n >= 1 && n <= 9) return v;
        return null;
      };
      const data = {
        hero:  heroN,
        level: levelN,
        might: mightN,
        levels: { G:toLevel("G",gRaw), M:toLevel("M",mRaw), S:toLevel("S",sRaw), E:toLevel("E",eRaw) },
      };
      const match = fuzzyMatch(name, allPlayers);
      return { raw:line, name, data, match };
    });
    setResults(parsed);
    setDecisions({});
  };

  const decide = (i, choice) => setDecisions(d => ({ ...d, [i]: choice }));

  const counts = results ? results.reduce((acc, r, i) => {
    if (r.type === "error") { acc.errors++; return acc; }
    if (r.match.type === "exact") { acc.matched++; return acc; }
    if (r.match.type === "suggestion") {
      if      (decisions[i] === "update") { acc.matched++;    acc.resolved++; }
      else if (decisions[i] === "skip")   { acc.skipped++;    acc.resolved++; }
      else if (decisions[i] === "create") { acc.newPlayers++; acc.resolved++; }
      else                                { acc.pending++; }
      return acc;
    }
    if      (decisions[i] === "create") acc.newPlayers++;
    else if (decisions[i] === "skip")   acc.skipped++;
    else                                acc.pending++;
    return acc;
  }, { matched:0, skipped:0, errors:0, pending:0, newPlayers:0, resolved:0 }) : null;

  const canSave = results && counts && counts.pending === 0 && (counts.matched > 0 || counts.newPlayers > 0);

  const save = () => {
    _ensure();
    const players = [...storage.getPlayers()];
    results.forEach((r, i) => {
      if (r.type === "error") return;
      const upd = r.data;
      if (r.match.type === "exact" || (r.match.type === "suggestion" && decisions[i] === "update")) {
        const idx = players.findIndex(p => p.id === r.match.player.id);
        if (idx !== -1) players[idx] = { ...players[idx], ...upd };
      } else if (decisions[i] === "create") {
        players.push({ id:uid(), name:r.name, clan:newClan, active:true, ...upd });
      }
    });
    window._appData.players = players;
    saveToSheets(window._appData);
    setSaved(true);
    setTimeout(() => { setSaved(false); onBack(); }, 1400);
  };

  const StatPill = ({ data }) => (
    <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginTop:6 }}>
      {[
        { label:"Hero",  val:data.hero,  color:"#7c3aed" },
        { label:"Lvl",   val:data.level, color:"#0891b2" },
        { label:"Might", val:data.might != null ? (data.might >= 1_000_000 ? (data.might/1_000_000).toFixed(1)+"M" : (data.might/1_000).toFixed(0)+"k") : null, color:"#d97706" },
        ...Object.entries(data.levels).filter(([,v])=>v).map(([k,v])=>({ label:k, val:v, color:{ G:"#166534",M:"#92400e",S:"#1e40af",E:"#7e22ce" }[k] })),
      ].filter(s => s.val != null).map(s => (
        <span key={s.label} style={{ backgroundColor:s.color+"15", color:s.color, borderRadius:4, padding:"2px 7px", fontSize:11, fontWeight:700, fontFamily:"'DM Mono',monospace" }}>
          {s.label}: {s.val}
        </span>
      ))}
    </div>
  );

  if (!results) return (
    <div style={{ padding:"0 16px 16px" }}>
      <BackBtn onBack={onBack}/>
      <h2 style={{ fontSize:20, fontWeight:800, color:"#1e293b", margin:"0 0 4px" }}>Bulk Update Players</h2>
      <p style={{ fontSize:13, color:"#64748b", margin:"0 0 16px", lineHeight:1.6 }}>
        Paste one player per line in this format:<br/>
        <code style={{ backgroundColor:"#f1f5f9", padding:"2px 8px", borderRadius:4, fontFamily:"'DM Mono',monospace", fontSize:12 }}>
          Name Hero Level Might G-level M-level S-level E-level
        </code>
      </p>
      <div style={{ backgroundColor:"#f8fafc", borderRadius:10, padding:"10px 14px", fontSize:12, color:"#94a3b8", lineHeight:1.8, marginBottom:16 }}>
        <span style={{ fontWeight:600, color:"#64748b" }}>Example:</span><br/>
        <code style={{ fontFamily:"'DM Mono',monospace" }}>DragonSlayer 18 35 1850000 G4 M3 S2 E1</code><br/>
        <code style={{ fontFamily:"'DM Mono',monospace" }}>IronFist 22 40 2400000 G6 M5 S4 E3</code>
      </div>
      <div style={{ marginBottom:16 }}>
        <Label>Clan for any new players created</Label>
        <SelField value={newClan} onChange={setNewClan} options={CLANS.map(c=>({value:c,label:c}))} placeholder="Select clan…"/>
      </div>
      <textarea
        value={text}
        onChange={e => setText(e.target.value)}
        placeholder="Paste player data here…"
        style={{ width:"100%", minHeight:180, padding:12, borderRadius:10, border:"1.5px solid #e2e8f0", fontSize:13, color:"#1e293b", resize:"vertical", fontFamily:"'DM Mono',monospace", boxSizing:"border-box", outline:"none", lineHeight:1.7 }}
      />
      <Btn onClick={parse} variant="primary" size="lg" fullWidth disabled={!text.trim()} style={{ marginTop:12 }}>
        Parse &amp; Match
      </Btn>
    </div>
  );

  return (
    <div style={{ padding:"0 16px 16px" }}>
      <BackBtn onBack={onBack}/>
      <h2 style={{ fontSize:20, fontWeight:800, color:"#1e293b", margin:"0 0 12px" }}>Bulk Update Players</h2>

      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
        {[
          { label:"Updated",  val:counts.matched,    color:"#16a34a", bg:"#f0fdf4" },
          { label:"New",      val:counts.newPlayers, color:"#7c3aed", bg:"#f5f3ff" },
          { label:"Review",   val:counts.pending,    color:"#d97706", bg:"#fef3c7" },
          { label:"Skipped",  val:counts.skipped,    color:"#64748b", bg:"#f1f5f9" },
          { label:"Errors",   val:counts.errors,     color:"#dc2626", bg:"#fef2f2" },
        ].filter(s => s.val > 0).map(s => (
          <span key={s.label} style={{ backgroundColor:s.bg, color:s.color, borderRadius:8, padding:"4px 12px", fontSize:12, fontWeight:700 }}>
            {s.val} {s.label}
          </span>
        ))}
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {results.map((r, i) => {
          if (r.type === "error") return (
            <Card key={i} style={{ borderLeft:"3px solid #dc2626", opacity:0.7 }}>
              <div style={{ fontSize:13, color:"#dc2626", fontWeight:600, marginBottom:2 }}>Could not parse</div>
              <div style={{ fontSize:12, color:"#94a3b8", fontFamily:"'DM Mono',monospace" }}>{r.raw}</div>
              <div style={{ fontSize:11, color:"#dc2626", marginTop:4 }}>{r.reason}</div>
            </Card>
          );

          if (r.match.type === "exact") return (
            <Card key={i} style={{ borderLeft:"3px solid #16a34a" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <Icon name="check" size={16} color="#16a34a"/>
                <span style={{ fontSize:14, fontWeight:700, color:"#1e293b" }}>{r.match.player.name}</span>
                <ClanBadge clan={r.match.player.clan}/>
              </div>
              {r.name.toLowerCase() !== r.match.player.name.toLowerCase() &&
                <div style={{ fontSize:11, color:"#94a3b8", marginTop:4 }}>Pasted as: <code style={{ fontFamily:"'DM Mono',monospace" }}>{r.name}</code></div>
              }
              <StatPill data={r.data}/>
            </Card>
          );

          if (r.match.type === "suggestion") {
            const dec = decisions[i];
            return (
              <Card key={i} style={{ borderLeft:`3px solid ${dec==="update"?"#16a34a":dec==="skip"?"#94a3b8":dec==="create"?"#7c3aed":"#f59e0b"}` }}>
                <div style={{ fontSize:12, color:"#d97706", fontWeight:600, marginBottom:4 }}>
                  Did you mean <strong>{r.match.player.name}</strong>?
                </div>
                <div style={{ fontSize:12, color:"#94a3b8", marginBottom:4 }}>
                  Pasted as: <code style={{ fontFamily:"'DM Mono',monospace" }}>{r.name}</code>
                </div>
                <StatPill data={r.data}/>
                {!dec && (
                  <div style={{ display:"flex", gap:6, marginTop:10 }}>
                    <Btn onClick={()=>decide(i,"skip")}   variant="ghost"   size="sm" fullWidth><Icon name="xmark" size={13} color="#64748b"/> Skip</Btn>
                    <Btn onClick={()=>decide(i,"update")} variant="success" size="sm" fullWidth><Icon name="check" size={13} color="#fff"/> Update</Btn>
                    <button onClick={()=>decide(i,"create")} style={{ flex:1, backgroundColor:"#7c3aed", color:"#fff", border:"none", borderRadius:10, fontWeight:700, cursor:"pointer", display:"inline-flex", alignItems:"center", justifyContent:"center", gap:4, padding:"7px 8px", fontSize:12, fontFamily:"'Outfit',system-ui,sans-serif", minHeight:44 }}><Icon name="userPlus" size={12} color="#fff"/> New</button>
                  </div>
                )}
                {dec && (
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:10 }}>
                    <span style={{ fontSize:12, fontWeight:700, color:dec==="update"?"#16a34a":dec==="create"?"#7c3aed":"#94a3b8" }}>
                      {dec==="update" ? "✓ Will be updated" : dec==="create" ? "✓ Will be created" : "— Skipped"}
                    </span>
                    <button onClick={()=>decide(i,null)} style={{ fontSize:11, color:"#94a3b8", background:"none", border:"none", cursor:"pointer", padding:0 }}>Undo</button>
                  </div>
                )}
              </Card>
            );
          }

          // no match
          const dec = decisions[i];
          return (
            <Card key={i} style={{ borderLeft:`3px solid ${dec==="create"?"#7c3aed":dec==="skip"?"#94a3b8":"#e2e8f0"}` }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                <Icon name="userPlus" size={14} color={dec?"#94a3b8":"#7c3aed"}/>
                <span style={{ fontSize:13, fontWeight:700, color:dec?"#94a3b8":"#1e293b" }}>
                  {dec==="create" ? "✓ Will be created" : dec==="skip" ? "— Skipped" : "No match — new player?"}
                </span>
              </div>
              <div style={{ fontSize:12, color:"#64748b", fontFamily:"'DM Mono',monospace", marginBottom:dec?0:2 }}>{r.name}</div>
              {!dec && <StatPill data={r.data}/>}
              {!dec && (
                <div style={{ display:"flex", gap:8, marginTop:10 }}>
                  <Btn onClick={()=>decide(i,"skip")}   variant="ghost"   size="sm" fullWidth><Icon name="xmark" size={13} color="#64748b"/> Skip</Btn>
                  <button onClick={()=>decide(i,"create")} style={{ flex:1, backgroundColor:"#7c3aed", color:"#fff", border:"none", borderRadius:10, fontWeight:700, cursor:"pointer", display:"inline-flex", alignItems:"center", justifyContent:"center", gap:6, padding:"7px 14px", fontSize:13, fontFamily:"'Outfit',system-ui,sans-serif", minHeight:44 }}>
                    <Icon name="userPlus" size={13} color="#fff"/> Create
                  </button>
                </div>
              )}
              {dec && (
                <button onClick={()=>decide(i,null)} style={{ fontSize:11, color:"#94a3b8", background:"none", border:"none", cursor:"pointer", padding:0, marginTop:4 }}>Undo</button>
              )}
            </Card>
          );
        })}
      </div>

      <div style={{ display:"flex", gap:10, marginTop:12 }}>
        <Btn onClick={() => { setResults(null); setDecisions({}); }} variant="ghost" size="lg" fullWidth>
          Re-paste
        </Btn>
        <button onClick={save} disabled={!canSave} style={{ flex:1, padding:"13px 0", borderRadius:12, border:"none", backgroundColor:saved?"#16a34a":canSave?"#1e293b":"#e2e8f0", color:saved||canSave?"#fff":"#94a3b8", fontSize:15, fontWeight:700, cursor:canSave?"pointer":"not-allowed", display:"flex", alignItems:"center", justifyContent:"center", gap:8, transition:"background-color 0.2s" }}>
          {saved ? <><Icon name="check" size={18} color="#fff"/> Saved!</> : counts.pending > 0 ? `Review ${counts.pending} left` : `Save ${counts.matched + counts.newPlayers} Player${(counts.matched+counts.newPlayers)!==1?"s":""}`}
        </button>
      </div>
    </div>
  );
};

// ─── MERGE PLAYERS VIEW ───────────────────────────────────────────────────────
const MergePlayersView = ({ onBack }) => {
  const { role, clan: sessionClan } = useSession();
  const forceUpdate = useForceUpdate();
  const def = role === "clan" ? sessionClan : "";

  const [pClan,      setPClan]      = useState(def);
  const [pSearch,    setPSearch]    = useState("");
  const [primaryIdx, setPrimaryIdx] = useState(-1);   // index into all[]

  const [sClan,     setSClan]     = useState(def);
  const [sSearch,   setSSearch]   = useState("");
  const [sourceIdx, setSourceIdx] = useState(-1);     // index into all[]

  const [confirm, setConfirm] = useState(false);

  const all = storage.getPlayers();

  // Resolved player objects (null if not yet selected)
  const primary = primaryIdx >= 0 ? (all[primaryIdx] || null) : null;
  const source  = sourceIdx  >= 0 ? (all[sourceIdx]  || null) : null;
  // Same entry selected in both pickers
  const sameP   = primaryIdx >= 0 && sourceIdx >= 0 && primaryIdx === sourceIdx;

  // Each entry carries its original index so two identically-named/id'd players
  // are always distinguishable even when IDs collide.
  const allIndexed = all.map((p, i) => Object.assign({}, p, { _idx: i }));

  // Primary list — exclude the source entry by index (not by id)
  let pList = allIndexed.slice();
  if (sourceIdx >= 0)  pList = pList.filter(p => p._idx !== sourceIdx);
  if (pClan !== "")    pList = pList.filter(p => p.clan === pClan);
  if (pSearch !== "")  pList = pList.filter(p => p.name && p.name.toLowerCase().indexOf(pSearch.toLowerCase()) !== -1);
  pList.sort((a, b) => (a.name||"").localeCompare(b.name||""));

  // Secondary list — exclude the primary entry by index
  let sList = allIndexed.slice();
  if (primaryIdx >= 0) sList = sList.filter(p => p._idx !== primaryIdx);
  if (sClan !== "")    sList = sList.filter(p => p.clan === sClan);
  if (sSearch !== "")  sList = sList.filter(p => p.name && p.name.toLowerCase().indexOf(sSearch.toLowerCase()) !== -1);
  sList.sort((a, b) => (a.name||"").localeCompare(b.name||""));

  const scoreCount = (pid) => {
    if (!pid) return 0;
    let n = 0;
    Object.values(storage.getScores()).forEach(entries =>
      entries.forEach(e => { if (e.scores && e.scores[pid]) n++; })
    );
    return n;
  };

  const doMerge = () => {
    _ensure();
    const prim = all[primaryIdx];
    const src  = all[sourceIdx];
    // Only merge scores when IDs differ; if IDs are the same the score key is shared
    if (prim.id !== src.id) {
      const allScores = storage.getScores();
      const newScores = {};
      Object.keys(allScores).forEach(key => {
        newScores[key] = allScores[key].map(entry => {
          if (!entry.scores || !entry.scores[src.id]) return entry;
          const s = Object.assign({}, entry.scores);
          const eventId = key.split("_").slice(1).join("_");
          const ev = EVENT_TYPES.find(e => e.id === eventId);
          const fk = ev && ev.fields[0] ? ev.fields[0].key : "points";
          if (s[prim.id]) {
            if (Number(s[src.id][fk] || 0) > Number(s[prim.id][fk] || 0)) s[prim.id] = s[src.id];
          } else {
            s[prim.id] = s[src.id];
          }
          delete s[src.id];
          return Object.assign({}, entry, { scores: s });
        });
      });
      window._appData.scores = newScores;
    }
    // Delete the source record by its original index, not by id
    window._appData.players = all.filter((p, i) => i !== sourceIdx);
    saveToSheets(window._appData);
    onBack();
  };

  const clanBtnStyle = (active) => ({
    padding:"8px 0", borderRadius:8, fontSize:13, fontWeight:700, border:"none",
    cursor:"pointer", flex:1,
    backgroundColor: active ? "#1e293b" : "#f1f5f9",
    color: active ? "#fff" : "#64748b",
  });

  const rowStyle = (selected) => ({
    padding:"10px 14px", borderRadius:10, cursor:"pointer", fontSize:14,
    fontWeight: selected ? 700 : 500,
    backgroundColor: selected ? "#1e293b" : "#f8fafc",
    color: selected ? "#fff" : "#1e293b",
    border: selected ? "2px solid #1e293b" : "1.5px solid #e2e8f0",
    display:"flex", alignItems:"center", gap:8,
  });

  return (
    <div style={{ padding:"0 16px 16px" }}>
      <BackBtn onBack={onBack}/>
      <h2 style={{ fontSize:20, fontWeight:800, color:"#1e293b", margin:"0 0 6px" }}>Merge Players</h2>
      <p style={{ fontSize:13, color:"#64748b", margin:"0 0 16px", lineHeight:1.5 }}>
        Pick a primary (keep) and secondary (delete). Score history is merged — higher score wins.
      </p>

      {/* ── Primary picker ── */}
      <div style={{ marginBottom:20 }}>
        <Label>Primary <span style={{ textTransform:"none", fontWeight:400, color:"#94a3b8", fontSize:11 }}>(keep this record)</span></Label>
        <div style={{ display:"flex", gap:6, marginBottom:8 }}>
          {["", ...CLANS].map(c => (
            <button key={c||"all"} type="button"
              onClick={() => { setPClan(c); setPrimaryIdx(-1); setPSearch(""); forceUpdate(); }}
              style={clanBtnStyle(pClan === c)}>
              {c || "All"}
            </button>
          ))}
        </div>
        <input
          placeholder="Search player…"
          onInput={e => { setPSearch(e.target.value); forceUpdate(); }}
          onChange={e => { setPSearch(e.target.value); forceUpdate(); }}
          style={{ width:"100%", padding:"11px 14px", borderRadius:10, border:"1.5px solid #e2e8f0", fontSize:14, color:"#1e293b", outline:"none", backgroundColor:"#fff", fontFamily:"'Outfit',system-ui,sans-serif", boxSizing:"border-box", marginBottom:4 }}/>
        <div style={{ fontSize:11, color:"#94a3b8", marginBottom:6 }}>
          {pList.length} player{pList.length !== 1 ? "s" : ""}{pClan ? " in " + pClan : " (all clans)"}{pSearch ? ' matching "' + pSearch + '"' : ""}
        </div>
        <div key={"p|" + pClan + "|" + pSearch + "|" + sourceIdx} style={{ maxHeight:200, overflowY:"auto", display:"flex", flexDirection:"column", gap:4 }}>
          {pList.length === 0
            ? <div style={{ fontSize:13, color:"#94a3b8" }}>No players found.</div>
            : pList.map(p => (
              <div key={p._idx} onClick={() => { setPrimaryIdx(p._idx); forceUpdate(); }} style={rowStyle(primaryIdx === p._idx)}>
                <span style={{ flex:1 }}>{p.name}</span>
                <ClanBadge clan={p.clan}/>
                {!p.active && <span style={{ fontSize:11, backgroundColor:"#e2e8f0", color:"#64748b", borderRadius:4, padding:"1px 6px" }}>Inactive</span>}
              </div>
            ))
          }
        </div>
      </div>

      {/* ── Secondary picker ── */}
      <div style={{ marginBottom:20 }}>
        <Label>Secondary <span style={{ textTransform:"none", fontWeight:400, color:"#94a3b8", fontSize:11 }}>(will be deleted)</span></Label>
        <div style={{ display:"flex", gap:6, marginBottom:8 }}>
          {["", ...CLANS].map(c => (
            <button key={c||"all"} type="button"
              onClick={() => { setSClan(c); setSourceIdx(-1); setSSearch(""); forceUpdate(); }}
              style={clanBtnStyle(sClan === c)}>
              {c || "All"}
            </button>
          ))}
        </div>
        <input
          placeholder="Search player…"
          onInput={e => { setSSearch(e.target.value); forceUpdate(); }}
          onChange={e => { setSSearch(e.target.value); forceUpdate(); }}
          style={{ width:"100%", padding:"11px 14px", borderRadius:10, border:"1.5px solid #e2e8f0", fontSize:14, color:"#1e293b", outline:"none", backgroundColor:"#fff", fontFamily:"'Outfit',system-ui,sans-serif", boxSizing:"border-box", marginBottom:4 }}/>
        <div style={{ fontSize:11, color:"#94a3b8", marginBottom:6 }}>
          {sList.length} player{sList.length !== 1 ? "s" : ""}{sClan ? " in " + sClan : " (all clans)"}{sSearch ? ' matching "' + sSearch + '"' : ""}
        </div>
        <div key={"s|" + sClan + "|" + sSearch + "|" + primaryIdx} style={{ maxHeight:200, overflowY:"auto", display:"flex", flexDirection:"column", gap:4 }}>
          {sList.length === 0
            ? <div style={{ fontSize:13, color:"#94a3b8" }}>No players found.</div>
            : sList.map(p => (
              <div key={p._idx} onClick={() => { setSourceIdx(p._idx); forceUpdate(); }} style={rowStyle(sourceIdx === p._idx)}>
                <span style={{ flex:1 }}>{p.name}</span>
                <ClanBadge clan={p.clan}/>
                {!p.active && <span style={{ fontSize:11, backgroundColor:"#e2e8f0", color:"#64748b", borderRadius:4, padding:"1px 6px" }}>Inactive</span>}
              </div>
            ))
          }
        </div>
      </div>

      {/* ── Validation / preview / action ── */}
      {sameP && (
        <div style={{ backgroundColor:"#fee2e2", borderRadius:10, padding:"10px 14px", fontSize:13, color:"#991b1b", marginBottom:12 }}>
          ⚠️ Same record selected in both. Pick a different entry for Secondary.
        </div>
      )}
      {primary && source && !sameP && (
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div style={{ display:"flex", gap:8 }}>
            {[{p:primary, label:"✓ Keep", accent:"#16a34a", idx:primaryIdx}, {p:source, label:"✗ Delete", accent:"#dc2626", idx:sourceIdx}].map(({p, label, accent, idx}) => (
              <div key={idx} style={{ flex:1, backgroundColor:"#f8fafc", borderRadius:12, padding:"12px", border:`2px solid ${accent}` }}>
                <div style={{ fontSize:10, fontWeight:700, color:accent, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:6 }}>{label}</div>
                <div style={{ fontSize:14, fontWeight:800, color:"#1e293b", marginBottom:4 }}>{p.name}</div>
                <ClanBadge clan={p.clan}/>
                <div style={{ fontSize:11, color:"#64748b", marginTop:6, display:"flex", flexDirection:"column", gap:1 }}>
                  {p.hero  != null && <span>Hero {p.hero}</span>}
                  {p.level != null && <span>Level {p.level}</span>}
                  {p.might != null && <span>{Number(p.might).toLocaleString()} Might</span>}
                  {p.levels && p.levels.G && <span>Guard {p.levels.G}</span>}
                  <span>{scoreCount(p.id)} score entries</span>
                  {!p.active && <span style={{ color:"#94a3b8" }}>Inactive</span>}
                </div>
              </div>
            ))}
          </div>
          <div style={{ backgroundColor:"#fef3c7", borderRadius:10, padding:"10px 14px", fontSize:13, color:"#92400e", lineHeight:1.5 }}>
            ⚠️ <strong>{source.name}</strong>'s scores merge into <strong>{primary.name}</strong>. <strong>{source.name}</strong> is permanently deleted.
          </div>
          <Btn onClick={() => setConfirm(true)} variant="danger" size="lg" fullWidth>Merge Players</Btn>
        </div>
      )}

      {confirm && (
        <Modal
          title={`Merge ${source ? source.name : ""} into ${primary ? primary.name : ""}?`}
          message={`${source ? source.name : ""} will be permanently deleted and their scores merged into ${primary ? primary.name : ""}. This cannot be undone.`}
          confirmLabel="Yes, Merge"
          confirmVariant="danger"
          onConfirm={doMerge}
          onCancel={() => setConfirm(false)}
        />
      )}
    </div>
  );
};

// ─── DELETE PLAYER VIEW ───────────────────────────────────────────────────────
// Defined at module level so it isn't re-created on every parent render
const DeletePlayerRow = ({ p, onDelete }) => (
  <Card style={{ display:"flex", alignItems:"center", gap:10 }}>
    <div style={{ width:36, height:36, borderRadius:10, backgroundColor:p.active?"#1e293b":"#e2e8f0", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, fontWeight:700, color:p.active?"#fff":"#94a3b8", flexShrink:0 }}>{p.name[0]}</div>
    <div style={{ flex:1, minWidth:0 }}>
      <div style={{ display:"flex", alignItems:"center", gap:6 }}>
        <span style={{ fontSize:14, fontWeight:700, color:"#1e293b", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.name}</span>
        {!p.active && <span style={{ fontSize:11, color:"#94a3b8", backgroundColor:"#f1f5f9", borderRadius:4, padding:"1px 6px", flexShrink:0 }}>Inactive</span>}
      </div>
      <div style={{ marginTop:3 }}><ClanBadge clan={p.clan}/></div>
    </div>
    <Btn onClick={() => onDelete(p)} variant="danger" size="sm">Delete</Btn>
  </Card>
);

const DeletePlayerView = ({ onBack }) => {
  const { role, clan: sessionClan } = useSession();
  const [clan,     setClan]    = useState(role === "clan" ? sessionClan : "");
  const [search,   setSearch]  = useState("");
  const [deleting, setDeleting] = useState(null);
  const forceUpdate = useForceUpdate();

  // Read from global each render — forceUpdate() ensures React re-runs this
  const allPlayers = storage.getPlayers();
  const filtered   = allPlayers
    .filter(p => clan   === "" || p.clan === clan)
    .filter(p => search === "" || p.name.toLowerCase().includes(search.toLowerCase()));
  const inactive = [...filtered].filter(p => !p.active).sort((a,b) => a.name.localeCompare(b.name));
  const active   = [...filtered].filter(p =>  p.active).sort((a,b) => a.name.localeCompare(b.name));

  const doDelete = () => {
    if (!deleting) return;
    _ensure();
    window._appData.players = storage.getPlayers().filter(p => p.id !== deleting.id);
    const allScores = storage.getScores();
    const newScores = {};
    Object.keys(allScores).forEach(key => {
      newScores[key] = allScores[key].map(entry => {
        if (!entry.scores?.[deleting.id]) return entry;
        const s = { ...entry.scores };
        delete s[deleting.id];
        return { ...entry, scores: s };
      });
    });
    window._appData.scores = newScores;
    saveToSheets(window._appData);
    setDeleting(null);
    forceUpdate();
  };

  return (
    <div style={{ padding:"0 16px 16px" }}>
      <BackBtn onBack={onBack}/>
      <h2 style={{ fontSize:20, fontWeight:800, color:"#1e293b", margin:"0 0 6px" }}>Delete Player</h2>
      <p style={{ fontSize:13, color:"#64748b", margin:"0 0 16px", lineHeight:1.5 }}>
        Permanently removes a player and all their score history. Inactive players are listed first.
      </p>
      <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:16 }}>
        <SelField value={clan} onChange={v => { setClan(v); setSearch(""); forceUpdate(); }}
          options={CLANS.map(c => ({ value:c, label:c }))} placeholder="All clans…"/>
        <input value={search} onChange={e => { setSearch(e.target.value); forceUpdate(); }}
          placeholder="Search player…" style={{ ...inputStyle }}/>
      </div>
      {filtered.length === 0 && <EmptyState icon="players" message="No players found"/>}
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {inactive.length > 0 && <>
          <div style={{ fontSize:11, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.08em", marginTop:4 }}>Inactive ({inactive.length})</div>
          <div key={"inactive|" + clan + "|" + search} style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {inactive.map(p => <DeletePlayerRow key={p.id} p={p} onDelete={setDeleting}/>)}
          </div>
        </>}
        {active.length > 0 && <>
          <div style={{ fontSize:11, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.08em", marginTop:inactive.length?12:4 }}>Active ({active.length})</div>
          <div key={"active|" + clan + "|" + search} style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {active.map(p => <DeletePlayerRow key={p.id} p={p} onDelete={setDeleting}/>)}
          </div>
        </>}
      </div>
      {deleting && (
        <Modal
          title={`Delete ${deleting.name}?`}
          message={`This will permanently delete ${deleting.name} and all their score history. This cannot be undone.`}
          confirmLabel="Yes, Delete"
          confirmVariant="danger"
          onConfirm={doDelete}
          onCancel={()=>setDeleting(null)}
        />
      )}
    </div>
  );
};

// ─── FRAGMENT DISTRIBUTION VIEW ──────────────────────────────────────────────
const FragmentDistributionView = ({ onBack }) => {
  const { role, clan:sessionClan } = useSession();
  const forceUpdate = useForceUpdate();

  const [step,         setStep]         = useState(1);
  const [clan,         setClan]         = useState(sessionClan || "");
  const [eventId,      setEventId]      = useState("omens");
  const [totalFrags,   setTotalFrags]   = useState("");
  const [winnerPct,    setWinnerPct]    = useState(33);
  const [chestPct,     setChestPct]     = useState(33);
  const [olyScorePct,  setOlyScorePct]  = useState(50);
  const [tierValues,   setTierValues]   = useState([...DEFAULT_TIER_VALUES]);
  const [showAdv,      setShowAdv]      = useState(false);
  const [allocations,  setAllocations]  = useState([]);
  const [saved,        setSaved]        = useState(false);

  const damagePct      = 100 - winnerPct - chestPct;
  const olyChestPct    = 100 - olyScorePct;
  const clanList       = role === "clan" ? [sessionClan] : CLANS;
  const allPlayers     = storage.getPlayers();
  const allScores      = storage.getScores();
  const scoreEntries   = allScores[`${clan}_${eventId}`] || [];
  const latestEntry    = scoreEntries[0] || null;
  const totalAvailable = Number(totalFrags) || 0;
  const totalAllocated = allocations.reduce((s, a) => s + (a.finalFrags || 0), 0);
  const remaining      = totalAvailable - totalAllocated;

  const buildAllocations = () => {
    const n = Number(totalFrags);
    if (!n || n <= 0) return;
    const allocs = eventId === "omens"
      ? calcOmensFrags(latestEntry, allPlayers, clan, n, winnerPct, chestPct, tierValues)
      : calcOlympusFrags(latestEntry, allPlayers, clan, n, olyScorePct, olyChestPct);
    setAllocations(allocs);
    setStep(3);
    scrollToTop();
  };

  const updateFinal = (playerId, val) =>
    setAllocations(prev => prev.map(a => a.playerId === playerId ? { ...a, finalFrags: Number(val)||0 } : a));

  const doSave = () => {
    const dist = {
      id: uid(), clan, eventId, date: today(),
      scoreEntryDate: latestEntry?.date || today(),
      totalFragments: totalAvailable,
      config: eventId === "omens" ? { winnerPct, chestPct, damagePct, tierValues } : { scorePct:olyScorePct, chestPct:olyChestPct },
      allocations,
    };
    storage.saveFragmentDistributions([dist, ...storage.getFragmentDistributions()]);
    setSaved(true);
    forceUpdate();
  };

  // ── Step 1: Setup ─────────────────────────────────────────────────────────
  if (step === 1) return (
    <div style={{ padding:"0 16px 16px" }}>
      <BackBtn onBack={onBack}/>
      <h2 style={{ fontSize:20, fontWeight:800, color:"#1e293b", margin:"0 0 6px" }}>Fragment Distribution</h2>
      <p style={{ fontSize:13, color:"#64748b", margin:"0 0 20px" }}>Select a clan and event to begin allocating fragments.</p>
      <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
        <div>
          <Label>Clan</Label>
          <SelField value={clan} onChange={v=>{ setClan(v); setSaved(false); }} options={clanList.map(c=>({value:c,label:c}))} placeholder="Select clan…"/>
        </div>
        <div>
          <Label>Event</Label>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            {[{id:"omens",name:"Omens"},{id:"olympus",name:"Olympus"}].map(ev=>(
              <button key={ev.id} onClick={()=>setEventId(ev.id)}
                style={{ padding:"14px 10px", borderRadius:10, border:`2px solid ${eventId===ev.id?"#1e293b":"#e2e8f0"}`, backgroundColor:eventId===ev.id?"#1e293b":"#fff", cursor:"pointer" }}>
                <div style={{ fontSize:14, fontWeight:700, color:eventId===ev.id?"#fff":"#1e293b" }}>{ev.name}</div>
              </button>
            ))}
          </div>
        </div>
        {clan && latestEntry && (
          <Card style={{ backgroundColor:"#f0f9ff", border:"1.5px solid #bae6fd" }}>
            <div style={{ fontSize:11, color:"#0891b2", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4 }}>Latest score entry</div>
            <div style={{ fontSize:16, fontWeight:800, color:"#1e293b" }}>{latestEntry.date}</div>
            <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>{Object.keys(latestEntry.scores||{}).length} players scored</div>
          </Card>
        )}
        {clan && !latestEntry && (
          <p style={{ fontSize:13, color:"#dc2626", margin:0, backgroundColor:"#fef2f2", padding:"10px 14px", borderRadius:8 }}>
            No score entries found for {clan} — {eventId}. Enter scores first.
          </p>
        )}
        <Btn onClick={()=>{ setStep(2); setSaved(false); setAllocations([]); scrollToTop(); }} variant="primary" size="lg" fullWidth disabled={!clan||!latestEntry}>
          Continue →
        </Btn>
      </div>
    </div>
  );

  // ── Step 2: Configure ─────────────────────────────────────────────────────
  if (step === 2) return (
    <div style={{ padding:"0 16px 16px" }}>
      <BackBtn onBack={()=>{ setStep(1); scrollToTop(); }}/>
      <h2 style={{ fontSize:20, fontWeight:800, color:"#1e293b", margin:"0 0 4px" }}>Configure</h2>
      <p style={{ fontSize:13, color:"#64748b", margin:"0 0 20px" }}>{clan} · {eventId==="omens"?"Omens":"Olympus"} · {latestEntry?.date}</p>
      <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
        <div>
          <Label>Total Fragments Available</Label>
          <input type="number" min="0" value={totalFrags} onChange={e=>setTotalFrags(e.target.value)} placeholder="e.g. 725" style={inputStyle}/>
        </div>

        {eventId === "omens" && (<>
          <div>
            <Label>Pool Weightings <span style={{ textTransform:"none", fontWeight:400, color:"#94a3b8", fontSize:11 }}>must total 100%</span></Label>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {[
                { label:"Winner Pool %", val:winnerPct,  set:setWinnerPct, color:"#3b82f6", hint:"Equal share per player (tier-adjusted)",  locked:false },
                { label:"Chest Pool %",  val:chestPct,   set:setChestPct,  color:"#16a34a", hint:"Proportional to Chest Score",             locked:false },
                { label:"Damage Pool %", val:damagePct,  set:null,         color:"#f59e0b", hint:"Auto-computed remainder",                 locked:true  },
              ].map(pool => (
                <div key={pool.label} style={{ backgroundColor:pool.locked?"#f8fafc":"#fff", borderRadius:10, padding:"10px 12px", border:`1.5px solid ${pool.locked?"#e2e8f0":pool.color+"55"}` }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:3 }}>
                    <span style={{ fontSize:13, fontWeight:700, color:"#1e293b" }}>{pool.label}</span>
                    {pool.locked
                      ? <span style={{ fontSize:16, fontWeight:800, fontFamily:"'DM Mono',monospace", color:damagePct<0?"#dc2626":pool.color }}>{damagePct}%</span>
                      : <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                          <input type="number" min="0" max="100" value={pool.val} onChange={e=>pool.set(Number(e.target.value))}
                            style={{ width:54, padding:"4px 8px", borderRadius:6, border:"1.5px solid #e2e8f0", fontSize:14, fontWeight:700, textAlign:"center", fontFamily:"'DM Mono',monospace" }}/>
                          <span style={{ fontSize:13, fontWeight:700, color:"#64748b" }}>%</span>
                        </div>
                    }
                  </div>
                  <div style={{ fontSize:11, color:"#94a3b8" }}>{pool.hint}</div>
                </div>
              ))}
              {damagePct < 0 && <p style={{ fontSize:12, color:"#dc2626", margin:0, fontWeight:600 }}>⚠ Pools exceed 100% — reduce Winner or Chest %</p>}
            </div>
          </div>
          <div>
            <button onClick={()=>setShowAdv(v=>!v)}
              style={{ fontSize:12, color:"#64748b", fontWeight:600, background:"none", border:"none", cursor:"pointer", padding:0, display:"flex", alignItems:"center", gap:6 }}>
              <span style={{ fontSize:10 }}>{showAdv?"▼":"▶"}</span> Advanced: Tier Values
            </button>
            {showAdv && (
              <div style={{ marginTop:10, padding:"12px", backgroundColor:"#f8fafc", borderRadius:10, display:"flex", flexDirection:"column", gap:8 }}>
                <p style={{ fontSize:12, color:"#64748b", margin:"0 0 4px" }}>Players whose essence matches a tier value get a <strong>full</strong> winner share. Others get half.</p>
                {tierValues.map((tv, i) => (
                  <div key={i} style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontSize:11, color:"#94a3b8", fontWeight:600, width:28 }}>T{i+1}</span>
                    <input type="number" value={tv} onChange={e=>setTierValues(prev=>prev.map((v,j)=>j===i?Number(e.target.value):v))}
                      style={{ flex:1, padding:"6px 10px", borderRadius:6, border:"1.5px solid #e2e8f0", fontSize:13, fontFamily:"'DM Mono',monospace" }}/>
                    <button onClick={()=>setTierValues(prev=>prev.filter((_,j)=>j!==i))}
                      style={{ color:"#dc2626", background:"none", border:"none", cursor:"pointer", fontSize:18, padding:"0 4px", lineHeight:1 }}>×</button>
                  </div>
                ))}
                <button onClick={()=>setTierValues(prev=>[...prev,0])}
                  style={{ fontSize:12, color:"#3b82f6", background:"none", border:"none", cursor:"pointer", padding:0, textAlign:"left", fontWeight:700 }}>
                  + Add tier
                </button>
              </div>
            )}
          </div>
        </>)}

        {eventId === "olympus" && (
          <div>
            <Label>Pool Weightings <span style={{ textTransform:"none", fontWeight:400, color:"#94a3b8", fontSize:11 }}>must total 100%</span></Label>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {[
                { label:"Score Pool %", val:olyScorePct, set:setOlyScorePct, color:"#3b82f6", hint:"Proportional to Score",  locked:false },
                { label:"Chest Pool %", val:olyChestPct, set:null,           color:"#16a34a", hint:"Proportional to Chests — auto-computed remainder", locked:true },
              ].map(pool => (
                <div key={pool.label} style={{ backgroundColor:pool.locked?"#f8fafc":"#fff", borderRadius:10, padding:"10px 12px", border:`1.5px solid ${pool.locked?"#e2e8f0":pool.color+"55"}` }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:3 }}>
                    <span style={{ fontSize:13, fontWeight:700, color:"#1e293b" }}>{pool.label}</span>
                    {pool.locked
                      ? <span style={{ fontSize:16, fontWeight:800, fontFamily:"'DM Mono',monospace", color:pool.color }}>{pool.val}%</span>
                      : <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                          <input type="number" min="0" max="100" value={pool.val} onChange={e=>pool.set(Math.max(0, Math.min(100, Number(e.target.value))))}
                            style={{ width:54, padding:"4px 8px", borderRadius:6, border:"1.5px solid #e2e8f0", fontSize:14, fontWeight:700, textAlign:"center", fontFamily:"'DM Mono',monospace" }}/>
                          <span style={{ fontSize:13, fontWeight:700, color:"#64748b" }}>%</span>
                        </div>
                    }
                  </div>
                  <div style={{ fontSize:11, color:"#94a3b8" }}>{pool.hint}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <Btn onClick={buildAllocations} variant="primary" size="lg" fullWidth
          disabled={!totalFrags||totalAvailable<=0||(eventId==="omens"&&damagePct<0)}>
          Calculate Allocations →
        </Btn>
      </div>
    </div>
  );

  // ── Step 3: Review & Save ─────────────────────────────────────────────────
  const scored   = allocations.filter(a=>a.scored).sort((a,b)=>b.calculatedFrags-a.calculatedFrags);
  const unscored = allocations.filter(a=>!a.scored).sort((a,b)=>a.playerName.localeCompare(b.playerName));

  return (
    <div style={{ padding:"0 16px 16px" }}>
      <BackBtn onBack={()=>{ setStep(2); setSaved(false); scrollToTop(); }}/>
      <h2 style={{ fontSize:20, fontWeight:800, color:"#1e293b", margin:"0 0 4px" }}>Review Allocation</h2>
      <p style={{ fontSize:12, color:"#64748b", margin:"0 0 12px" }}>{clan} · {eventId==="omens"?"Omens":"Olympus"} · {latestEntry?.date}</p>

      {/* Running totals bar */}
      <div style={{ backgroundColor: remaining<0?"#fef2f2": remaining===0?"#f0fdf4":"#f8fafc",
        border:`1.5px solid ${remaining<0?"#fca5a5":remaining===0?"#86efac":"#e2e8f0"}`,
        borderRadius:10, padding:"10px 14px", marginBottom:14,
        display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div>
          <div style={{ fontSize:14, fontWeight:800, color:"#1e293b", fontFamily:"'DM Mono',monospace" }}>
            {totalAllocated.toLocaleString()} / {totalAvailable.toLocaleString()}
          </div>
          <div style={{ fontSize:11, fontWeight:600, marginTop:1,
            color: remaining<0?"#dc2626": remaining===0?"#16a34a":"#94a3b8" }}>
            {remaining<0 ? `${Math.abs(remaining).toLocaleString()} over budget!`
              : remaining===0 ? "Fully allocated ✓"
              : `${remaining.toLocaleString()} unallocated`}
          </div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          {!saved
            ? <Btn onClick={doSave} variant="primary" size="sm">Save</Btn>
            : <span style={{ fontSize:12, color:"#16a34a", fontWeight:700, alignSelf:"center" }}>Saved ✓</span>
          }
          <Btn onClick={()=>exportFragsCSV({ clan, eventId, date:today(), allocations })} variant="ghost" size="sm">CSV</Btn>
          <Btn onClick={()=>emailFragDist(clan, eventId, allocations)} variant="ghost" size="sm">Email</Btn>
        </div>
      </div>

      {/* Scored players */}
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {scored.map(a => (
          <Card key={a.playerId}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:30, height:30, borderRadius:8, backgroundColor:"#1e293b", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, color:"#fff", flexShrink:0 }}>{a.playerName[0]}</div>
                <span style={{ fontSize:14, fontWeight:700, color:"#1e293b" }}>{a.playerName}</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:11, color:"#94a3b8", fontWeight:600 }}>Calc: {a.calculatedFrags}</span>
                <span style={{ fontSize:11, color:"#cbd5e1" }}>→</span>
                <input type="number" min="0" value={a.finalFrags}
                  onChange={e=>updateFinal(a.playerId, e.target.value)}
                  style={{ width:56, padding:"4px 8px", borderRadius:6, border:"1.5px solid #cbd5e1", fontSize:13, fontWeight:800, textAlign:"center", fontFamily:"'DM Mono',monospace", color:"#1e293b" }}/>
              </div>
            </div>
            {eventId === "omens"
              ? <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginTop:2 }}>
                  <span style={{ fontSize:10, backgroundColor:"#f5f3ff", color:"#7c3aed", borderRadius:4, padding:"2px 6px", fontWeight:600 }}>Essence {Number(a.essence).toLocaleString()}</span>
                  <span style={{ fontSize:10, backgroundColor:"#fffbeb", color:"#d97706", borderRadius:4, padding:"2px 6px", fontWeight:600 }}>Damage {Number(a.damageScore).toLocaleString()}</span>
                  <span style={{ fontSize:10, backgroundColor:"#f0fdf4", color:"#16a34a", borderRadius:4, padding:"2px 6px", fontWeight:600 }}>Chests {a.chestScore}</span>
                </div>
              : <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginTop:2 }}>
                  <span style={{ fontSize:10, backgroundColor:"#eff6ff", color:"#3b82f6", borderRadius:4, padding:"2px 6px", fontWeight:600 }}>Score {Number(a.score).toLocaleString()} → {a.scoreFrags}</span>
                  <span style={{ fontSize:10, backgroundColor:"#f0fdf4", color:"#16a34a", borderRadius:4, padding:"2px 6px", fontWeight:600 }}>Chests {Number(a.chestScore).toLocaleString()} → {a.chestFrags}</span>
                </div>
            }
          </Card>
        ))}

        {unscored.length > 0 && (<>
          <p style={{ fontSize:11, color:"#94a3b8", fontWeight:600, margin:"8px 0 2px", textTransform:"uppercase", letterSpacing:"0.06em" }}>
            Not scored this event — 0 frags
          </p>
          {unscored.map(a => (
            <Card key={a.playerId} style={{ opacity:0.45 }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <div style={{ width:28, height:28, borderRadius:7, backgroundColor:"#94a3b8", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:"#fff" }}>{a.playerName[0]}</div>
                  <span style={{ fontSize:13, color:"#94a3b8", fontWeight:600 }}>{a.playerName}</span>
                </div>
                <span style={{ fontSize:13, fontWeight:700, color:"#94a3b8", fontFamily:"'DM Mono',monospace" }}>0</span>
              </div>
            </Card>
          ))}
        </>)}
      </div>

      {saved && (
        <div style={{ marginTop:16, display:"flex", gap:10 }}>
          <Btn onClick={()=>exportFragsCSV({ clan, eventId, date:today(), allocations })} variant="ghost" size="lg" fullWidth>Export CSV</Btn>
          <Btn onClick={()=>emailFragDist(clan, eventId, allocations)} variant="ghost" size="lg" fullWidth>Email</Btn>
          <Btn onClick={onBack} variant="primary" size="lg" fullWidth>Done</Btn>
        </div>
      )}
    </div>
  );
};

// ─── MISSING LEVELS VIEW ─────────────────────────────────────────────────────
const MissingGuardView = ({ onBack }) => {
  const [clan, setClan] = useState("");
  const forceUpdate = useForceUpdate();

  const allPlayers  = storage.getPlayers();
  const clanPlayers = allPlayers.filter(p =>
    p.clan === clan && p.active && Object.keys(LEVEL_TYPES).some(t => !p.levels?.[t])
  );

  const updateLevel = (playerId, type, val) => {
    storage.savePlayers(allPlayers.map(p =>
      p.id === playerId ? { ...p, levels: { ...p.levels, [type]: val || null } } : p
    ));
    forceUpdate();
  };

  return (
    <div style={{ padding:"0 16px 16px" }}>
      <BackBtn onBack={onBack}/>
      <h2 style={{ fontSize:20, fontWeight:800, color:"#1e293b", margin:"0 0 6px" }}>Missing Levels</h2>
      <p style={{ fontSize:13, color:"#64748b", margin:"0 0 16px" }}>Active players with one or more unit levels not yet set.</p>
      <div style={{ marginBottom:16 }}>
        <Label>Clan</Label>
        <SelField value={clan} onChange={setClan} options={CLANS.map(c=>({value:c,label:c}))} placeholder="Select clan…"/>

      {clan && clanPlayers.length === 0 && (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"40px 0", gap:10 }}>

          <p style={{ fontSize:14, color:"#64748b", margin:0 }}>All active {clan} players have all levels set ✓</p>
        </div>
      )}
      {clan && clanPlayers.length > 0 && (
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <p style={{ fontSize:12, color:"#94a3b8", margin:"0 0 4px" }}>{clanPlayers.length} player{clanPlayers.length!==1?"s":""} with missing levels</p>

                <span style={{ fontSize:14, fontWeight:700, color:"#1e293b" }}>{p.name}</span>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {Object.entries(LEVEL_TYPES).map(([type, cfg]) => {
                  const missing = !p.levels?.[type];
                  return (
                    <div key={type} style={{ backgroundColor: missing ? "#fef2f2" : "#f8fafc", borderRadius:8, padding:"8px 8px 6px", border:`1.5px solid ${missing?"#fca5a5":"#e2e8f0"}` }}>
                      <div style={{ fontSize:10, fontWeight:700, color: missing?"#dc2626":"#64748b", textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:4 }}>{cfg.label}</div>
                      <SelField
                        value={p.levels?.[type] || ""}
                        onChange={v => updateLevel(p.id, type, v)}
                        options={cfg.levels.map(l => ({value:l, label:l}))}
                        placeholder={missing ? "Set level…" : "Change…"}
                      />
                    </div>
                  );
                })}
              </div>
            </Card>
          ))}
        </div>
      )}
    </div>
  );
};
